services:
  - type: web
    name: multi-tenant-subdomain
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MAIN_DOMAIN
        value: pawansuthar.in
      - key: RENDER
        value: "true"
    plan: free

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deploy Your Site - globetrekker.site</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: #0a0a0a;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #fff;
      }
      .container {
        width: 100%;
        max-width: 480px;
      }
      .logo {
        text-align: center;
        margin-bottom: 40px;
      }
      .logo h1 {
        font-size: 1.8rem;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.5px;
      }
      .logo span {
        color: #22c55e;
      }
      .card {
        background: #141414;
        border: 1px solid #262626;
        border-radius: 16px;
        padding: 32px;
      }
      .tabs {
        display: flex;
        margin-bottom: 28px;
        background: #1a1a1a;
        border-radius: 10px;
        padding: 4px;
      }
      .tab {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: none;
        color: #737373;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s ease;
      }
      .tab.active {
        background: #262626;
        color: #fff;
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .preview {
        background: #1a1a1a;
        padding: 14px 16px;
        border-radius: 10px;
        margin-bottom: 24px;
        color: #22c55e;
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.95rem;
        text-align: center;
      }
      .input-group {
        margin-bottom: 20px;
      }
      .input-group label {
        display: block;
        color: #a3a3a3;
        margin-bottom: 8px;
        font-size: 0.85rem;
        font-weight: 500;
      }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #262626;
        border-radius: 10px;
        background: #1a1a1a;
        color: #fff;
        font-size: 1rem;
        transition: border-color 0.2s ease;
      }
      .input-group input:focus {
        outline: none;
        border-color: #22c55e;
      }
      .input-group input::placeholder {
        color: #525252;
      }
      .input-group input[type="file"] {
        padding: 12px;
        cursor: pointer;
      }
      .input-group input[type="file"]::file-selector-button {
        background: #262626;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        color: #fff;
        font-size: 0.85rem;
        cursor: pointer;
        margin-right: 12px;
      }
      .hint {
        color: #525252;
        font-size: 0.8rem;
        margin-top: 8px;
      }
      .btn {
        width: 100%;
        padding: 16px;
        background: #22c55e;
        border: none;
        border-radius: 10px;
        color: #000;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-top: 8px;
      }
      .btn:hover {
        background: #16a34a;
        transform: translateY(-1px);
      }
      .btn:disabled {
        background: #404040;
        color: #737373;
        cursor: not-allowed;
        transform: none;
      }
      .message {
        margin-top: 20px;
        padding: 14px;
        border-radius: 10px;
        display: none;
      }
      .message.success {
        display: block;
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid #22c55e;
        color: #22c55e;
      }
      .message.error {
        display: block;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid #ef4444;
        color: #ef4444;
      }
      .message.info {
        display: block;
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid #3b82f6;
        color: #3b82f6;
      }
      .result {
        margin-top: 16px;
        padding: 12px;
        background: #1a1a1a;
        border-radius: 8px;
      }
      .result a {
        color: #22c55e;
        text-decoration: none;
        font-family: "SF Mono", Monaco, monospace;
        font-size: 0.9rem;
      }
      .result a:hover {
        text-decoration: underline;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-radius: 50%;
        border-top-color: #000;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>globetrekker.<span>site</span></h1>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('create')">
            Create New
          </button>
          <button class="tab" onclick="switchTab('upload')">Update Site</button>
        </div>

        <!-- Create Tab -->
        <div id="create-tab" class="tab-content active">
          <div class="preview" id="preview">yoursite.globetrekker.site</div>

          <div class="input-group">
            <label for="subdomain">Subdomain</label>
            <input
              type="text"
              id="subdomain"
              placeholder="e.g., myproject"
              maxlength="30"
              autocomplete="off"
            />
          </div>

          <div class="input-group">
            <label for="createZipFile">Upload Files (ZIP)</label>
            <input type="file" id="createZipFile" accept=".zip" />
            <div class="hint">Optional - leave empty for default page</div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Min 4 characters"
              minlength="4"
              autocomplete="off"
            />
            <div class="hint">Use this to update your site later</div>
          </div>

          <button id="createBtn" class="btn" onclick="createSubdomain()">
            Deploy Site
          </button>
        </div>

        <!-- Upload Tab -->
        <div id="upload-tab" class="tab-content">
          <div class="input-group">
            <label for="uploadSubdomain">Subdomain</label>
            <input
              type="text"
              id="uploadSubdomain"
              placeholder="e.g., myproject"
              maxlength="30"
              autocomplete="off"
            />
          </div>

          <div class="input-group">
            <label for="uploadPassword">Password</label>
            <input
              type="password"
              id="uploadPassword"
              placeholder="Your password"
              minlength="4"
              autocomplete="off"
            />
          </div>

          <div class="input-group">
            <label for="zipFile">Upload ZIP File</label>
            <input type="file" id="zipFile" accept=".zip" />
            <div class="hint">Must contain index.html</div>
          </div>

          <button id="uploadBtn" class="btn" onclick="uploadZip()">
            Update Site
          </button>
        </div>

        <div class="message" id="message"></div>
      </div>
    </div>

    <script>
      const mainDomain = "globetrekker.site";

      const subdomainInput = document.getElementById("subdomain");
      const preview = document.getElementById("preview");
      const message = document.getElementById("message");
      const createBtn = document.getElementById("createBtn");
      const createZipFileInput = document.getElementById("createZipFile");
      const passwordInput = document.getElementById("password");
      const uploadSubdomainInput = document.getElementById("uploadSubdomain");
      const zipFileInput = document.getElementById("zipFile");
      const uploadBtn = document.getElementById("uploadBtn");
      const uploadPasswordInput = document.getElementById("uploadPassword");

      subdomainInput.addEventListener("input", function () {
        const value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, "");
        this.value = value;
        preview.textContent = value
          ? `${value}.${mainDomain}`
          : `yoursite.${mainDomain}`;
        hideMessage();
      });

      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((c) => c.classList.remove("active"));

        if (tab === "create") {
          document.querySelectorAll(".tab")[0].classList.add("active");
          document.getElementById("create-tab").classList.add("active");
        } else {
          document.querySelectorAll(".tab")[1].classList.add("active");
          document.getElementById("upload-tab").classList.add("active");
        }
        hideMessage();
      }

      async function createSubdomain() {
        const subdomain = subdomainInput.value.trim();
        const file = createZipFileInput.files[0];
        const password = passwordInput.value;

        if (!subdomain || subdomain.length < 3) {
          showMessage("Subdomain must be at least 3 characters", "error");
          return;
        }

        if (!password || password.length < 4) {
          showMessage("Password must be at least 4 characters", "error");
          return;
        }

        createBtn.disabled = true;
        createBtn.innerHTML = '<span class="spinner"></span>Deploying...';
        hideMessage();

        try {
          const formData = new FormData();
          formData.append("subdomain", subdomain);
          formData.append("password", password);
          if (file) {
            formData.append("file", file);
          }

          const response = await fetch("/api/subdomain/create", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            showMessage(`Site deployed successfully!`, "success");
            subdomainInput.value = "";
            createZipFileInput.value = "";
            passwordInput.value = "";
            preview.textContent = `yoursite.${mainDomain}`;
          } else {
            showMessage(data.message || data.error, "error");
          }
        } catch (error) {
          showMessage("Failed to deploy. Please try again.", "error");
          console.error(error);
        } finally {
          createBtn.disabled = false;
          createBtn.textContent = "Deploy Site";
        }
      }

      async function uploadZip() {
        const subdomain = uploadSubdomainInput.value.trim();
        const file = zipFileInput.files[0];
        const password = uploadPasswordInput.value;

        if (!subdomain) {
          showMessage("Please enter subdomain", "error");
          return;
        }

        if (!password || password.length < 4) {
          showMessage("Please enter your password", "error");
          return;
        }

        if (!file) {
          showMessage("Please select a ZIP file", "error");
          return;
        }

        uploadBtn.disabled = true;
        uploadBtn.innerHTML = '<span class="spinner"></span>Updating...';
        hideMessage();

        const formData = new FormData();
        formData.append("subdomain", subdomain);
        formData.append("password", password);
        formData.append("file", file);

        try {
          const response = await fetch("/api/subdomain/upload", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          if (data.success) {
            showMessage("Site updated successfully!", "success");
            zipFileInput.value = "";
            uploadPasswordInput.value = "";
          } else {
            showMessage(data.message || data.error, "error");
          }
        } catch (error) {
          showMessage("Failed to update. Please try again.", "error");
          console.error(error);
        } finally {
          uploadBtn.disabled = false;
          uploadBtn.textContent = "Update Site";
        }
      }

      function showMessage(text, type) {
        message.className = "message " + type;
        message.innerHTML = text;
      }

      function hideMessage() {
        message.className = "message";
        message.innerHTML = "";
      }
    </script>
  </body>
</html>

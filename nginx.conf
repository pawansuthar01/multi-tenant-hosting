# NGINX Configuration for Multi-Tenant Subdomain System
# ========================================================

# 1. DNS SETUP (Required)
# ----------------------
# Before configuring NGINX, you need to set up a wildcard DNS record:
# 
# Go to your domain registrar (GoDaddy, Namecheap, Cloudflare, etc.)
# Create an A record:
#   - Host: *.pawansuthar.in
#   - Value: YOUR_SERVER_IP
#   - TTL: Auto or 300
#
# This will route all subdomains (e.g., new.pawansuthar.in) to your server.

# 2. NGINX CONFIGURATION
# ----------------------
# Save this file as /etc/nginx/sites-available/pawansuthar.in
# Then create a symlink: ln -s /etc/nginx/sites-available/pawansuthar.in /etc/nginx/sites-enabled/

# HTTP Server (redirects to HTTPS - optional, for production)
server {
    listen 80;
    listen [::]:80;
    server_name pawansuthar.in *.pawansuthar.in;

    # Let Node.js handle all subdomain routing
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Important: Pass original host to Node.js for subdomain detection
        proxy_set_header X-Original-Host $http_host;
    }
}


# 3. NGINX COMMANDS
# -----------------
# Test configuration: nginx -t
# Reload NGINX: systemctl reload nginx
# Restart NGINX: systemctl restart nginx


# 4. COMPLETE SERVER SETUP STEPS
# -------------------------------
# Step 1: Update package index
#   sudo apt update
#
# Step 2: Install NGINX
#   sudo apt install nginx
#
# Step 3: Create NGINX config file
#   sudo nano /etc/nginx/sites-available/pawansuthar.in
#   (paste the configuration above)
#
# Step 4: Enable the site
#   sudo ln -s /etc/nginx/sites-available/pawansuthar.in /etc/nginx/sites-enabled/
#
# Step 5: Remove default site (optional)
#   sudo rm /etc/nginx/sites-enabled/default
#
# Step 6: Test and reload
#   sudo nginx -t
#   sudo systemctl reload nginx


# 5. HOW IT WORKS
# ---------------
# 1. DNS resolves *.pawansuthar.in to your server IP
# 2. NGINX receives the request with the subdomain in the Host header
# 3. NGINX proxies ALL requests (including subdomains) to Node.js
# 4. Node.js extracts subdomain from Host header and serves appropriate folder
#
# Example flow:
# - User visits: http://new.pawansuthar.in
# - DNS: new.pawansuthar.in → SERVER_IP
# - NGINX: Receives request with Host: new.pawansuthar.in
# - NGINX: Proxies to http://localhost:3000 (preserving Host header)
# - Node.js: Detects "new" subdomain
# - Node.js: Serves /sites/new/index.html
